Lister les utilisateurs (admin)
---
summary: Lister tous les utilisateurs avec pagination et filtres
description: Réservé aux administrateurs. Permet de rechercher et filtrer les utilisateurs.
tags:
  - Admin
security:
  - apiKey: []
parameters:
  - name: page
    in: query
    type: integer
    required: false
  - name: per_page
    in: query
    type: integer
    required: false
    description: Max 100
  - name: search
    in: query
    type: string
    required: false
    description: Recherche sur username, email ou nom
  - name: is_admin
    in: query
    type: boolean
    required: false
  - name: is_active
    in: query
    type: boolean
    required: false
responses:
  200:
    description: Liste paginée des utilisateurs
    schema:
      properties:
        users:
          type: array
          items:
            type: object
        pagination:
          type: object
  401:
    description: Token JWT manquant ou invalide
  403:
    description: Droits administrateur requis
