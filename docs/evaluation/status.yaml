Statut d'une soumission
---
summary: Consulter le statut d'une soumission de modèle
description: Retourne l'état actuel d'une soumission depuis la base de données. Seul le propriétaire ou un admin peut consulter.
tags:
  - Submissions
security:
  - apiKey: []
parameters:
  - name: submission_id
    in: path
    type: string
    format: uuid
    required: true
    description: UUID de la soumission
responses:
  200:
    description: Statut de la soumission
    schema:
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, failed]
        score:
          type: number
          format: float
          description: Score principal (null si pas encore calculé)
        metrics_detail:
          type: object
          description: Détail des métriques calculées
        model_type:
          type: string
        created_at:
          type: string
          format: date-time
  401:
    description: Token JWT manquant ou invalide
  403:
    description: Accès refusé (pas le propriétaire)
  404:
    description: Soumission introuvable
