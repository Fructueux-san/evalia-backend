Créer une nouvelle compétition
---
summary: Formulaire de création d'une compétition
description: Crée une nouvelle compétition. L'endpoint attend un formulaire multipart avec les métadonnées. Les fichiers de datasets sont optionnels à la création. JWT requis.
tags:
  - Competitions
security:
  - apiKey: []
parameters:
  - name: slug
    in: formData
    type: string
    required: true
    description: "Identifiant URL unique (ex: ma-competition-2024)"
  - name: title
    in: formData
    type: string
    required: true
    description: Titre de la compétition
  - name: description
    in: formData
    type: string
    required: true
    description: Description détaillée (markdown)
  - name: task_type
    in: formData
    type: string
    required: true
    enum: [classification, regression, clustering, nlp, computer_vision]
  - name: primary_metric
    in: formData
    type: string
    required: true
    enum: [accuracy, f1_score, precision, recall, auc_roc, log_loss, rmse, mae, r2, mape]
  - name: start_date
    in: formData
    type: string
    format: date-time
    required: true
    description: Date d'ouverture des soumissions (ISO 8601)
  - name: end_date
    in: formData
    type: string
    format: date-time
    required: true
    description: Date de clôture des soumissions (ISO 8601)
  - name: raw_dataset
    in: formData
    type: file
    required: false
    description: Dataset d'entraînement brut (CSV, XLSX, JSON, Parquet)
  - name: processed_dataset
    in: formData
    type: file
    required: false
    description: Dataset de vérité terrain — JAMAIS exposé publiquement
  - name: max_submissions_per_day
    in: formData
    type: integer
    required: false
    default: 10
  - name: max_submissions_total
    in: formData
    type: integer
    required: false
    default: 50
responses:
  201:
    description: Compétition créée avec succès
    schema:
      properties:
        message:
          type: string
          example: Compétition créée avec succès
        id:
          type: string
          format: uuid
        slug:
          type: string
  400:
    description: Données invalides ou manquantes
  401:
    description: Token JWT manquant ou invalide
  409:
    description: Ce slug est déjà pris
  500:
    description: Erreur serveur
